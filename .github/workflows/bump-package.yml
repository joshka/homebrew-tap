name: Bump package formula

on:
  workflow_dispatch:
    inputs:
      package:
        description: Formula to update
        required: true
        type: choice
        options:
          - betamax
          - jk
      version:
        description: Upstream version without a leading v
        required: true
        type: string
      tag:
        description: Betamax release tag, defaults to betamax-v<version>
        required: false
        type: string
      automerge:
        description: Enable auto-merge for the generated PR
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: bump-package-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  bump:
    name: Open formula update PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      PACKAGE: ${{ inputs.package }}
      VERSION: ${{ inputs.version }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Check automation token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN so generated PRs trigger normal checks."
            exit 1
          fi

      - name: Check out tap
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update formula
        run: |
          args=(--package "$PACKAGE" --version "$VERSION")
          if [ -n "$TAG" ]; then
            args+=(--tag "$TAG")
          fi
          python3 .github/scripts/bump_formula.py "${args[@]}"

      - name: Validate updater
        run: python3 -m unittest discover -s tests

      - name: Create or update pull request
        env:
          AUTO_MERGE: ${{ inputs.automerge }}
        run: |
          if git diff --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi

          branch="automation/bump-${PACKAGE}-${VERSION}"
          title="Update ${PACKAGE} formula to ${VERSION}"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          Update \`${PACKAGE}\` to \`${VERSION}\`.

          This PR was generated by the tap bump workflow.
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "$branch"
          git add "Formula/${PACKAGE}.rb"
          git commit -m "$title"
          git push --force-with-lease origin "$branch"

          pr_url="$(gh pr list --head "$branch" --json url --jq '.[0].url')"
          if [ -z "$pr_url" ]; then
            pr_url="$(gh pr create --title "$title" --body-file "$body_file" --base main --head "$branch")"
          else
            gh pr edit "$pr_url" --title "$title" --body-file "$body_file"
          fi

          echo "Pull request: $pr_url"
          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$pr_url" --auto --squash --delete-branch
          fi
